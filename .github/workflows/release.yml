name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}

jobs:
  build:
    strategy:
      matrix:
        include:
          # Self-contained (包含 .NET 运行时)
          - os: windows-latest
            rid: win-x64
            artifact: AiProxy-win-x64
            extension: .exe
            selfContained: true
          - os: ubuntu-latest
            rid: linux-x64
            artifact: AiProxy-linux-x64
            extension: ''
            selfContained: true
          - os: macos-latest
            rid: osx-arm64
            artifact: AiProxy-osx-arm64
            extension: ''
            selfContained: true
          # Framework-dependent (需目标机器安装 .NET 10 运行时)
          - os: windows-latest
            rid: win-x64
            artifact: AiProxy-win-x64-fdd
            extension: .exe
            selfContained: false
          - os: ubuntu-latest
            rid: linux-x64
            artifact: AiProxy-linux-x64-fdd
            extension: ''
            selfContained: false
          - os: macos-latest
            rid: osx-arm64
            artifact: AiProxy-osx-arm64-fdd
            extension: ''
            selfContained: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish AiProxy/AiProxy.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained ${{ matrix.selfContained }} \
            -o ./publish
        shell: bash

      - name: Package (zip)
        run: |
          cd publish
          7z a -tzip ../${{ matrix.artifact }}-${{ env.RELEASE_TAG }}.zip .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.RELEASE_TAG }}
          path: ${{ matrix.artifact }}-${{ env.RELEASE_TAG }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag exists
        run: |
          git fetch --tags
          if ! git tag -l "$RELEASE_TAG" | grep -q .; then
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/**/*.zip
